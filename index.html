<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a0a1a 0%, #2d1b3d 50%, #1a0a1a 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .heart-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse at center, rgba(255, 105, 180, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
        }

        .question-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            text-align: center;
            opacity: 0;
            animation: fadeInTransition 1s ease forwards;
            animation-delay: 0.5s;
        }

        .question-container.hide {
            display: none;
        }

        @keyframes fadeInTransition {
            to { opacity: 1; }
        }

        .main-gif {
            width: 280px;
            height: 260px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 105, 180, 0.4), 0 0 80px rgba(255, 105, 180, 0.2);
            margin-bottom: 20px;
            transition: all 0.5s ease;
        }

        .main-gif:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px rgba(255, 105, 180, 0.6), 0 0 100px rgba(255, 105, 180, 0.3);
        }

        .title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b9d, #ffa3c4, #ff6b9d, #ff8fab);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 3s ease infinite;
            margin-bottom: 10px;
        }

        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .message {
            color: #ffb6d9;
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .buttons-container {
            display: flex;
            gap: 30px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 50%, #ff6b9d 100%);
            color: white;
            box-shadow: 0 8px 30px rgba(255, 107, 157, 0.5);
            z-index: 100;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 40px rgba(255, 107, 157, 0.7);
        }

        .btn-no {
            background: linear-gradient(135deg, #4a4a4a 0%, #6a6a6a 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            z-index: 100;
        }

        .floating-hearts, .confetti, .flower-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .floating-hearts { z-index: 100; }
        .flower-container { z-index: 150; }
        .confetti { z-index: 200; }

        .floating-heart {
            position: absolute;
            font-size: 2rem;
            animation: fall linear forwards;
            opacity: 0;
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .flower {
            position: absolute;
            opacity: 0;
            transform: scale(0);
            animation: bloom 1s ease forwards;
        }

        @keyframes bloom {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(360deg); opacity: 1; }
        }

        .success-container {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .success-container.show {
            display: flex;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #ff6b9d;
            margin-bottom: 20px;
            animation: heartbeat 1s ease infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .success-message {
            color: #ffb6d9;
            font-size: 1.3rem;
            max-width: 500px;
            line-height: 1.8;
        }

        .no-messages {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b9d;
            font-size: 1.3rem;
            opacity: 0;
            z-index: 500;
            text-align: center;
            font-weight: 600;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: visible;
        }

        .no-messages.show {
            animation: popMessage 2s ease forwards;
        }

        @keyframes popMessage {
            0% { opacity: 0; transform: translate(-50%, 20px); }
            15% { opacity: 1; transform: translate(-50%, 0); }
            85% { opacity: 1; transform: translate(-50%, 0); }
            100% { opacity: 0; transform: translate(-50%, -20px); }
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.8), 0 0 20px rgba(255, 107, 157, 0.6), 0 0 30px rgba(255, 107, 157, 0.4);
        }

        .envelope-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #fff8f0 50%, #fff5ee 100%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .intro-typewriter {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Dancing Script', cursive;
            font-size: 4rem;
            color: #ff6b9d;
            text-shadow: 0 0 20px rgba(255, 107, 157, 0.8), 0 0 40px rgba(255, 107, 157, 0.4);
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 100;
            white-space: nowrap;
        }

        .intro-typewriter.show { opacity: 1; }
        .intro-typewriter.fade-out { opacity: 0; transition: opacity 0.5s ease; }

        .envelope-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .envelope {
            position: relative;
            width: 350px;
            height: 240px;
            animation: float 3s ease-in-out infinite;
            transform-origin: center center;
        }

        .envelope.no-float {
            animation: none;
            transform: translateY(30px);
        }

        .envelope.pop {
            animation: popOpen 0.9s ease forwards;
        }

        .envelope.expand-massive {
            animation: massiveExpand 1.5s ease-in forwards;
        }

        @keyframes massiveExpand {
            0% { transform: translateY(30px) scale(1); opacity: 1; }
            30% { transform: translateY(30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(30px) scale(15); opacity: 0; }
        }

        @keyframes popOpen {
            0% { transform: translateY(30px) scale(1); }
            25% { transform: translateY(30px) scale(1.15); }
            50% { transform: translateY(30px) scale(1.1); }
            70% { transform: translateY(30px) scale(1.2); }
            100% { transform: translateY(30px) scale(1); }
        }

        .envelope-back {
            position: absolute;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffb6d9 0%, #ff6b9d 50%, #ff8fab 100%);
            border-radius: 0 0 20px 20px;
            box-shadow: 0 10px 40px rgba(255, 107, 157, 0.4);
        }

        .envelope-flap {
            position: absolute;
            top: 0; left: 0; width: 0; height: 0;
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-top: 120px solid #ff8fab;
            transform-origin: top;
            transition: transform 0.6s ease 0.5s;
            z-index: 10;
        }

        .envelope.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1; 
        }

        .envelope-front {
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 0;
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-bottom: 120px solid #ffa3c4;
            z-index: 8;
        }

        .envelope-glow {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            border-radius: 20px;
            background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0.8) 0%, rgba(255, 182, 217, 0.6) 40%, transparent 70%);
            opacity: 0;
            z-index: 5;
            pointer-events: none;
        }

        .envelope.open .envelope-glow {
            animation: glowPulse 2s ease forwards;
        }

        @keyframes glowPulse {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(2.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(3); }
        }

        .intro-sparkles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1500;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .intro-sparkles.show { opacity: 1; }

        .intro-sparkles .sparkle-particle {
            position: absolute;
            font-size: 2.5rem;
            animation: fullScreenBurst 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes fullScreenBurst {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
            70% { opacity: 1; transform: translate(var(--x), var(--y)) scale(1.5); }
            100% { opacity: 0; transform: translate(var(--x-end), var(--y-end)) scale(0.2); }
        }

        .scene-transition-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 2500;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        
        .scene-transition-overlay.flash {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .title { font-size: 2rem; }
            .main-gif { width: 220px; height: 200px; }
            .btn { padding: 14px 30px; font-size: 1.1rem; }
            .buttons-container { gap: 15px; }
            .intro-typewriter { font-size: 2.5rem; top: 10%; }
            .envelope { width: 280px; height: 190px; }
            .envelope-flap { border-left: 140px solid transparent; border-right: 140px solid transparent; border-top: 95px solid #ff8fab; }
            .envelope-front { border-left: 140px solid transparent; border-right: 140px solid transparent; border-bottom: 95px solid #ffa3c4; }
        }
    </style>
</head>
<body>
    <div class="scene-transition-overlay" id="scene-transition"></div>

    <div class="envelope-container" id="envelope-container">
        <div class="intro-typewriter" id="intro-typewriter"></div>
        <div class="envelope-wrapper">
            <div class="envelope" id="envelope">
                <div class="envelope-back"></div>
                <div class="envelope-flap"></div>
                <div class="envelope-front"></div>
                <div class="envelope-glow"></div>
            </div>
        </div>
    </div>

    <div class="intro-sparkles" id="intro-sparkles"></div>

    <div class="stars" id="stars"></div>
    <div class="heart-bg"></div>
    
    <div class="container">
        <div class="question-container hide" id="question-container">
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp6ZzR4eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" 
                 class="main-gif floating"
                 id="main-gif"
                 alt="Valentine Bear">
            
            <h1 class="title glow-text">Will You Be My Valentine?</h1>
            <p class="message">From your secret admirer 💕</p>
            
            <div class="buttons-container" id="buttons">
                <button class="btn btn-yes" id="yes-btn" onmouseover="resetGif()" onclick="sayYes()">Yes! ❤️</button>
                <button class="btn btn-no" id="no-btn" onmouseover="handleNoHover()" ontouchstart="handleNoHover()">No 😢</button>
            </div>
        </div>

        <div class="success-container" id="success-container">
            <h1 class="success-title glow-text">❤️ I Love You! ❤️</h1>
            
            <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExdTdhaG5nODllaTM3aWplemx1bnNwbmhsOWtibnJ6OHA3eTRkcmxlMCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/1JmGiBtqTuehfYxuy9/giphy.gif"
                 alt="Happy Celebration"
                 class="main-gif"
                 id="success-gif">
            
            <p class="success-message" id="success-message">
                You've made me the happiest person alive! 💖<br>
                Happy Valentine's Day, my love! 🥰
            </p>
        </div>
    </div>

    <div class="no-messages" id="no-messages"></div>
    <div class="floating-hearts" id="floating-hearts"></div>
    <div class="confetti" id="confetti"></div>
    <div class="flower-container" id="flowers"></div>

    <script>
        let noGifChanged = false;
        let lastMessageIndex = -1;
        const normalGifUrl = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHp1eXp6ZzR4eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6eGZ6ZSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif";
        const sadGifUrl = "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjc0ZHI3bmQxaWtzcDBwczZ4eTA2M2Y1M3hvcnFvaHFzcWRveGY3NSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/lPM06f2zvk94jBAzlP/giphy.gif";
        const preloadedSadGif = new Image();
        preloadedSadGif.src = sadGifUrl;

        const noMessages = [
            "Are you sure? 🥺",
            "Please think again! 😢",
            "Don't break my heart 💔",
            "I'll be very sad 😿",
            "Please say yes! 🙏",
            "My heart is breaking 💔",
            "One more chance? 🥺",
            "I love you so much 😢",
            "Is that your final answer? 😰",
            "You're breaking my heart! 😭",
            "Think about our future! 🥺",
            "Error 404: 'Yes' not found 🤖",
            "Please reconsider! 🥺",
            "Don't do this to me! 😩",
            "I'll buy you good food! 🍕",
            "Have a heart! ❤️‍🩹",
            "I'm literally crying rn 😭",
            "Press Yes for unlimited hugs! 🤗",
            "Why are you running?! 🏃‍♂️💨",
            "I promise to be good! 🥺"
        ];

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.opacity = Math.random() * 0.5 + 0.3;
                starsContainer.appendChild(star);
            }
        }

        function handleNoHover() {
            moveNoButton();
            
            const messageEl = document.getElementById('no-messages');
            
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * noMessages.length);
            } while (randomIndex === lastMessageIndex);
            lastMessageIndex = randomIndex;
            messageEl.textContent = noMessages[randomIndex];
            
            messageEl.classList.remove('show');
            void messageEl.offsetWidth;
            messageEl.classList.add('show');
            
            if (!noGifChanged) {
                document.getElementById('main-gif').src = sadGifUrl;
                noGifChanged = true;
            }
        }

        function moveNoButton() {
            const noBtn = document.getElementById('no-btn');
            
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 40) + 20;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = Math.max(10, Math.min(x, window.innerWidth - noBtn.offsetWidth - 10)) + 'px';
            noBtn.style.top = Math.max(10, Math.min(y, window.innerHeight - noBtn.offsetHeight - 10)) + 'px';
        }


        function resetGif() {
            document.getElementById('main-gif').src = normalGifUrl;
            noGifChanged = false;
        }

        function sayYes() {
            document.getElementById('question-container').classList.add('hide');
            document.getElementById('success-container').classList.add('show');
            
            createConfetti();
            createFallingHearts(50);
            setTimeout(createFlowers, 500);
        }

        function createFallingHearts(count) {
            const container = document.getElementById('floating-hearts');
            const hearts = ['❤️', '🧡', '💛', '💚', '💙', '💜', '🩷', '🤍', '💖', '💕', '💗', '💓'];
            
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                    container.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 7000);
                }, i * 100);
            }
        }

        function createConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#ff6b9d', '#ff8fab', '#ffa3c4', '#ffd700', '#ff69b4', '#ff1493', '#da70d6', '#00ced1'];
            
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti-piece';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.transform = 'rotate(' + Math.random() * 360 + 'deg)';
                
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                container.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 5000);
            }
        }

        function createFlowers() {
            const container = document.getElementById('flowers');
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const flower = document.createElement('div');
                    flower.className = 'flower';
                    flower.style.left = Math.random() * 100 + 'vw';
                    flower.style.top = Math.random() * 100 + 'vh';
                    flower.style.fontSize = (Math.random() * 40 + 30) + 'px';
                    
                    const petals = ['🌸', '🌺', '🌻', '🌷', '💐', '🌹'];
                    flower.textContent = petals[Math.floor(Math.random() * petals.length)];
                    
                    container.appendChild(flower);
                    
                    setTimeout(() => flower.remove(), 5000);
                }, i * 150);
            }
        }

        function typeWriter() {
            const envelope = document.getElementById('envelope');
            const introTypewriter = document.getElementById('intro-typewriter');
            const envelopeContainer = document.getElementById('envelope-container');
            const introSparkles = document.getElementById('intro-sparkles');
            const flashTransition = document.getElementById('scene-transition');
            const questionContainer = document.getElementById('question-container');
            const introText = "Something special for you...";
            let charIndex = 0;

            function type() {
                if (charIndex < introText.length) {
                    introTypewriter.textContent += introText.charAt(charIndex);
                    charIndex++;
                    setTimeout(type, 120);
                } else {
                    setTimeout(() => {
                        introTypewriter.classList.add('fade-out');
                        envelope.classList.remove('no-float'); 
                        envelope.classList.add('pop');
                        
                        setTimeout(() => {
                            envelope.classList.add('open');
                            
                            setTimeout(() => {
                                createIntroSparkles();
                                introSparkles.classList.add('show');
                                
                                setTimeout(() => {
                                    envelope.classList.add('expand-massive');
                                    
                                    setTimeout(() => {
                                        flashTransition.classList.add('flash');
                                        
                                        setTimeout(() => {
                                            envelopeContainer.style.display = 'none';
                                            introSparkles.style.display = 'none';
                                            questionContainer.classList.remove('hide');
                                            
                                            flashTransition.classList.remove('flash');
                                        }, 800);
                                    }, 800);
                                }, 1200);
                            }, 600);
                        }, 600);
                    }, 800);
                }
            }

            createStars();
            setTimeout(() => {
                introTypewriter.classList.add('show');
                envelope.classList.add('no-float');
                setTimeout(type, 500);
            }, 500);
        }

        function createIntroSparkles() {
            const container = document.getElementById('intro-sparkles');
            const particles = ['✨', '💕', '💖', '💗', '💓', '💝', '⭐', '🌟', '💫', '🤍', '❤️'];
            
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'sparkle-particle';
                    particle.textContent = particles[Math.floor(Math.random() * particles.length)];
                    
                    particle.style.setProperty('--x', (Math.random() * 300 - 150) + 'vw');
                    particle.style.setProperty('--y', (Math.random() * 300 - 150) + 'vh');
                    particle.style.setProperty('--x-end', (Math.random() * 500 - 250) + 'vw');
                    particle.style.setProperty('--y-end', (Math.random() * 500 - 250) + 'vh');
                    
                    particle.style.left = '50%';
                    particle.style.top = '50%';
                    container.appendChild(particle);

                    setTimeout(() => particle.remove(), 2000);
                }, i * 10);
            }
        }

        window.onload = () => {
            typeWriter();
        };
    </script>
</body>
</html>
